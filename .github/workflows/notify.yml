name: WC2026 Pre-match Notifier

on:
  schedule:
    # :25 and :55 during UTC 15-23 and 0-4 = Thai 22:00-11:59
    # :55 run -> T-5 for :00 kickoffs + T-60 for next-hour :00 kickoffs
    # :25 run -> T-5 for :30 kickoffs + T-60 for next-hour :30 kickoffs
    - cron: "25,55 0-4,15-23 * * *"
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Send pre-match notifications
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python notify.py
