name: WC2026 Instant Results

on:
  schedule:
    # ทุก 10 นาที ช่วงบอลจบจริง (ไทย 00:00-13:59) — sent_results.json กันส่งซ้ำ
    - cron: "*/10 0-6,17-23 * * *"
    # กันชนเกมลากยาว ไทย 14:00-16:00
    - cron: "0,20,40 7-8 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: results
  cancel-in-progress: false

jobs:
  results:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Announce finished matches
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python results.py
      - name: Commit state
        run: |
          if [ -f sent_results.json ] && [ -n "$(git status --porcelain sent_results.json)" ]; then
            git config user.name "wc26-bot"
            git config user.email "actions@github.com"
            git add sent_results.json
            git commit -m "Update announced results"
            git pull --rebase origin main
            git push
          fi
